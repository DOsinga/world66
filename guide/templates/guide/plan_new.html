{% extends "guide/base.html" %}
{% block title %}New trip — World66{% endblock %}
{% block content %}
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">World<span class="logo-dot"></span>66</div>
    <h1>New trip</h1>
    <form method="post" action="/plans/new/">
      {% csrf_token %}
      {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
      <label for="title">Trip name</label>
      <input type="text" id="title" name="title" autofocus autocomplete="off" placeholder="e.g. Summer in France">
      <label for="password">Passphrase</label>
      <input type="password" id="password" name="password" autocomplete="new-password" placeholder="At least 6 characters">
      <label for="password2">Confirm</label>
      <input type="password" id="password2" name="password2" autocomplete="new-password">
      <button type="submit">Create trip</button>
    </form>
  </div>
</div>
{% endblock %}
