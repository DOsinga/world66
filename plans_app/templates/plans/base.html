{% extends "guide/base.html" %}
{% load static %}

{% block body_style %}
<link rel="stylesheet" href="{% static 'plans/css/tabbi.css' %}">
{% endblock %}

{% block topnav %}
<nav class="tabbi-nav">
  <a href="/plans/" class="tabbi-nav-logo">
    <img src="{% static 'plans/tabbi-logo.svg' %}" alt="Tab.bi" class="tabbi-nav-logo-img">
    <span class="tabbi-nav-logo-text">Tab<span class="tabbi-nav-logo-dot">.</span>bi</span>
  </a>
  <div class="tabbi-nav-actions">
    {% if request.session.authenticated_plans %}
      <a href="/auth/logout/" class="tabbi-btn tabbi-btn--ghost">Sign out</a>
    {% else %}
      <a href="/plans/new/" class="tabbi-btn">+ New trip</a>
    {% endif %}
  </div>
</nav>
{% endblock topnav %}
